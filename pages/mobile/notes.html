<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Productivity Tracker</title>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/mobile/notes.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <header class="navbar">
        <h2><i class="fa-solid fa-chart-line"></i> Dashboard</h2>
            <div class="nav-right">
                <label class="theme-toggle">
                <input type="checkbox" id="toggleMode" />
                <span class="slider">
                    <span class="icon moon-icon">🌙</span>
                    <span class="icon sun-icon">☀️</span>
                </span>
                </label>

            <!-- Profile User -->
                <div class="profile-menu">
                    <button class="user-btn">
                        <i class="fa-solid fa-user"></i>
                    </button>
            <!-- Dropdown -->
                    <div class="dropdown">
                        <a href="notes.html"><i class="fa-solid fa-pencil"></i> Notesphere</a>
                        <a href="feedback.html"><i class="fa-solid fa-comment"></i> Voice Board</a>
                        <a href="logout.html"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <div class="notes-page">
          <div class="notes-grid">
            <section class="card todo-card">
              <div class="stats-container">
                <div class="details">
                  <h1>To-Do List</h1>
                  <p>Keep track of your daily tasks and goals.</p>
                  <div id="progressBar">
                    <div id="progress"></div>
                  </div>
                </div>
                <div class="stats-numbers">
                  <p id="numbers">0/0</p>
                </div>
              </div>

              <form action="">
                <input type="text" id="taskInput" placeholder="Add a new task..." />
                <button id="newTask" type="submit">+</button>
              </form>

              <ul id="task-list" class="task-list"></ul>
            </section>

            <section class="card notes-section boost-card">
              <h2><i class="fa-solid fa-rocket"></i> Boost Notes</h2>
              <p class="desc">Write something to motivate yourself.</p>

              <textarea id="boostInput" placeholder="Write something to boost yourself..."></textarea>

              <div class="btn-group">
                <button id="saveBoostBtn" class="notes-btn" type="button">Save</button>
                <button id="toggleBoostBtn" class="notes-btn secondary" type="button">View Notes</button>
              </div>

              <div id="boostList" class="notes-list"></div>
            </section>

            <section class="card notes-section mind-card">
              <h2><i class="fa-solid fa-brain"></i> Mind Notes</h2>
              <p class="desc">Write your thoughts and reflections.</p>

              <textarea id="mindInput" placeholder="Write your thoughts here..."></textarea>

              <div class="btn-group">
                <button id="saveMindBtn" class="notes-btn" type="button">Save</button>
                <button id="toggleMindBtn" class="notes-btn secondary" type="button">View Notes</button>
              </div>

              <div id="mindList" class="notes-list"></div>
            </section>
          </div>
        </div>

    <div class="menu">
            <li class="list">
            <a href="dashboard.html">
                <span class="icon"><i class="fa-solid fa-chart-line"></i></span>
            </a>
        </li>

        <li class="list">
            <a href="data.html">
                <span class="icon"><i class="fa-solid fa-edit"></i></span>
            </a>
        </li>
        <li class="list">
            <a href="home.html">
                <span class="icon"><img src="../../assets/logo.png" alt="Home" /></span>
            </a>
        </li>

        <li class="list">
            <a href="productivity.html">
                <span class="icon"><i class="fa-solid fa-chart-bar"></i></span>
            </a>
        </li>

        <li class="list">
            <a href="burnout.html">
                <span class="icon"><i class="fa-solid fa-fire"></i></span>
            </a>
        </li>
    </div>

    <script src="../../scripts/notes.js"></script>
    <script src="../../scripts/global.js"></script>

</body>
</html>
