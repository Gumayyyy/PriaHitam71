<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/component.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-layout.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="m-page-productivity">
    <header class="m-app-navbar">
        <h2><i class="fa-solid fa-chart-line"></i> Dashboard</h2>
            <div class="nav-right">
                <label class="theme-toggle">
                <input type="checkbox" id="toggleMode" />
                <span class="slider">
                    <span class="icon moon-icon">🌙</span>
                    <span class="icon sun-icon">☀️</span>
                </span>
                </label>

            <!-- Profile User -->
                <div class="profile-menu">
                    <button class="user-btn">
                        <i class="fa-solid fa-user"></i>
                    </button>
            <!-- Dropdown -->
                    <div class="dropdown">
                        <a href="notes.html"><i class="fa-solid fa-pencil"></i> Notesphere</a>
                        <a href="feedback.html"><i class="fa-solid fa-comment"></i> Voice Board</a>
                        <a href="logout.html"><i class="fa-solid fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- STATS -->
    <section class="stats">
      <div class="card">
        <h3><i class="fas fa-book-open"></i> Study Hours</h3>
        <h1>
          <span id="avgBelajar">0</span>
          <span class="unit">hrs/day</span>
        </h1>
        <div class="progress"><div id="progBelajar"></div></div>
      </div>

      <div class="card">
        <h3><i class="fas fa-bed"></i> Sleep Hours</h3>
        <h1>
          <span id="avgTidur">0</span>
          <span class="unit">hrs/day</span>
        </h1>
        <div class="progress"><div id="progTidur"></div></div>
      </div>

      <div class="card">
        <h3><i class="fas fa-mobile-alt"></i> Phone Usage</h3>
        <h1>
          <span id="avgHP">0</span>
          <span class="unit">hrs/day</span>
        </h1>
        <div class="progress"><div id="progHP"></div></div>
      </div>

    </section>

    <!-- CONTENT: Chart and Analysis side by side, then Rekomendasi below -->
    <section class="content">
      <!-- Chart + Analysis: Side by Side -->
      <div class="chart-analysis-row">
        <div class="chart-box chart-panel" id="productivityChartPanel">
          <h3>Weekly Productivity Chart</h3>
          <canvas id="myChart"></canvas>
        </div>

        <div class="analysis-box insight-panel is-empty" id="productivityAnalysisCard">
          <h3>Productivity Analysis</h3>
          <p class="empty-state-text" id="productivityEmptyText">⚠ Belum ada data untuk ditampilkan</p>
          <div id="analysisBoxes" class="boxes">
            <!-- Boxes akan diisi JS -->
          </div>
          <br>
        <h3 class="notes-title"><i class="fas fa-sticky-note"></i> Notes</h3>
        <ul id="rekomendasiList">
          <!-- Rekomendasi akan diisi JS -->
        </ul>
      </div>
        </div>
      </div>

    
      
    </section>

    <div class="m-app-menu">
            <li class="m-app-menu-item">
            <a href="dashboard.html">
                <span class="icon"><i class="fa-solid fa-chart-line"></i></span>
            </a>
        </li>

        <li class="m-app-menu-item">
            <a href="data.html">
                <span class="icon"><i class="fa-solid fa-edit"></i></span>
            </a>
        </li>
        <li class="m-app-menu-item">
            <a href="home.html">
                <span class="icon"><img src="../../assets/logo.png" alt="Home" /></span>
            </a>
        </li>

        <li class="m-app-menu-item">
            <a href="productivity.html">
                <span class="icon"><i class="fa-solid fa-chart-bar"></i></span>
            </a>
        </li>

        <li class="m-app-menu-item">
            <a href="burnout.html">
                <span class="icon"><i class="fa-solid fa-fire"></i></span>
            </a>
        </li>
    </div>

    <script src="../../scripts/productivity.js"></script>
    <script src="../../scripts/global.js"></script>

</body>
</html>
