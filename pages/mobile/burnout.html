<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/component.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-layout.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="m-page-burnout">
    <header class="m-app-navbar">
      <h2>
        <i class="style-node layout-node fas fa-fire"></i> Burnout Analysis
      </h2>
      <div class="nav-right">
        <label class="theme-toggle">
          <input type="checkbox" id="toggleMode" />
          <span class="slider">
            <span class="icon moon-icon">🌙</span>
            <span class="icon sun-icon">☀️</span>
          </span>
        </label>

        <!-- Profile User -->
        <div class="profile-menu">
          <button class="user-btn">
            <i class="fa-solid fa-user"></i>
          </button>
          <!-- Dropdown -->
          <div class="dropdown">
            <div class="dropdown-user-data">
              <div class="dropdown-user-avatar">
                <i class="fa-solid fa-user"></i>
              </div>
              <div class="dropdown-user-meta">
                <p class="dropdown-user-label">Signed in as</p>
                <p class="user-name">Loading...</p>
              </div>
            </div>
            <a href="notes.html"
              ><i class="style-node layout-node fa-regular fa-folder-open"></i>
              Notesphere</a
            >
            <a href="feedback.html"
              ><i class="style-node layout-node fa-solid fa-inbox"></i> Voice
              Board</a
            >
            <a href="logout.html"
              ><i class="style-node layout-node fa-solid fa-sign-out-alt"></i>
              Logout</a
            >
          </div>
        </div>
      </div>
    </header>

    <div class="analysis-container">
      <!-- Grafik Lingkaran -->
      <div class="chart-box circular-container">
        <h3>Burnout Score</h3>
        <div class="circle">
          <svg viewBox="0 0 36 36" class="circular-chart blue">
            <path
              class="circle-bg"
              d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
            />
            <path
              class="circle-path"
              stroke-dasharray="90, 100"
              d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
            />
            <text x="18" y="20.35" class="percentage">90%</text>
          </svg>
        </div>
        <p id="statusText" style="text-align: center; margin-top: 10px">
          Category: -
        </p>
      </div>

      <!-- Grafik Jam Tidur -->
      <div class="chart-box chart-panel" id="burnoutChartPanel">
        <h3>Weekly Burnout Chart</h3>
        <canvas id="sleepChart"></canvas>
      </div>

      <!-- Insight -->
      <div class="analysis-box">
        <h3>Insight Box</h3>
        <div class="analysis-card insight-panel is-empty" id="insightBox">
          ⚠ Belum ada data untuk ditampilkan
        </div>
      </div>
      <div class="analysis-box">
        <h3>Personal Notes</h3>
        <div class="analysis-card personal-panel is-empty" id="tipsBox">
          ⚠ Belum ada data untuk ditampilkan
        </div>
      </div>
    </div>

    <div class="m-app-menu">
      <li class="m-app-menu-item">
        <a href="dashboard.html">
          <span class="icon"><i class="fa-solid fa-chart-line"></i></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="data.html">
          <span class="icon"><i class="fa-solid fa-edit"></i></span>
        </a>
      </li>
      <li class="m-app-menu-item">
        <a href="home.html">
          <span class="icon"
            ><img src="../../assets/logo.png" alt="Home"
          /></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="productivity.html">
          <span class="icon"><i class="fa-solid fa-chart-bar"></i></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="burnout.html">
          <span class="icon"><i class="fa-solid fa-fire"></i></span>
        </a>
      </li>
    </div>

    <script src="../../scripts/burnout.js"></script>
    <script src="../../scripts/global.js"></script>
  </body>
</html>
