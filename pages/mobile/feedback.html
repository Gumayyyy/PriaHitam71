<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/component.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-layout.css" />
    <link rel="stylesheet" href="../../styles/mobile/mobile-style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body class="m-page-feedback">
    <header class="m-app-navbar">
      <h2>
        <i class="style-node layout-node fa-solid fa-inbox"></i> Voice Board
      </h2>
      <div class="nav-right">
        <label class="theme-toggle">
          <input type="checkbox" id="toggleMode" />
          <span class="slider">
            <span class="icon moon-icon">🌙</span>
            <span class="icon sun-icon">☀️</span>
          </span>
        </label>

        <!-- Profile User -->
        <div class="profile-menu">
          <button class="user-btn">
            <i class="fa-solid fa-user"></i>
          </button>
          <!-- Dropdown -->
          <div class="dropdown">
            <div class="dropdown-user-data">
              <div class="dropdown-user-avatar">
                <i class="fa-solid fa-user"></i>
              </div>
              <div class="dropdown-user-meta">
                <p class="dropdown-user-label">Signed in as</p>
                <p class="user-name">Loading...</p>
              </div>
            </div>
            <a href="notes.html"
              ><i class="style-node layout-node fa-regular fa-folder-open"></i>
              Notesphere</a
            >
            <a href="feedback.html"
              ><i class="style-node layout-node fa-solid fa-inbox"></i> Voice
              Board</a
            >
            <a href="logout.html"
              ><i class="style-node layout-node fa-solid fa-sign-out-alt"></i>
              Logout</a
            >
          </div>
        </div>
      </div>
    </header>

    <div class="contact-container">
      <h2>Let's Connect</h2>
      <p class="sub-heading">
        Have any questions or feedback? We'd love to hear from you!
      </p>

      <form action="">
        <div class="top-section">
          <div class="input-group">
            <label for="fullname">Your Name</label>
            <div class="input-container">
              <i class="fa-solid fa-user"></i>
              <input
                type="text"
                id="fullname"
                placeholder="Enter your name"
                required
              />
            </div>
          </div>

          <div class="input-group">
            <label for="date">Date</label>
            <div class="input-container">
              <i class="fa-solid fa-calendar"></i>
              <input type="date" id="date" required />
            </div>
          </div>
        </div>

        <div class="input-group">
          <label for="message">Message</label>
          <textarea
            id="message"
            placeholder="Enter your message"
            required
          ></textarea>
        </div>

        <div class="btn-input">
          <i class="fa-regular fa-paper-plane"></i>
          <input type="submit" value="Send" />
        </div>
      </form>
    </div>

    <div class="m-app-menu">
      <li class="m-app-menu-item">
        <a href="dashboard.html">
          <span class="icon"><i class="fa-solid fa-chart-line"></i></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="data.html">
          <span class="icon"><i class="fa-solid fa-edit"></i></span>
        </a>
      </li>
      <li class="m-app-menu-item">
        <a href="home.html">
          <span class="icon"
            ><img src="../../assets/logo.png" alt="Home"
          /></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="productivity.html">
          <span class="icon"><i class="fa-solid fa-chart-bar"></i></span>
        </a>
      </li>

      <li class="m-app-menu-item">
        <a href="burnout.html">
          <span class="icon"><i class="fa-solid fa-fire"></i></span>
        </a>
      </li>
    </div>

    <script src="../../scripts/feedback.js"></script>
    <script src="../../scripts/global.js"></script>
  </body>
</html>
