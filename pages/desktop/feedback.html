<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/desktop/feedback.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2><i class="fa-solid fa-inbox"></i> Voice Board</h2>
        </div>
        <ul>
          <li>
            <a href="home.html" class="nav-link nav-link-home"
              ><img src="../../assets/logo.png" alt="Home" /> <span>Home</span></a
            >
          </li>
          <li class="sidebar-divider" aria-hidden="true"></li>
          <li>
            <a href="dashboard.html" class="nav-link"
              ><i class="fas fa-chart-line"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="data.html" class="nav-link"
              ><i class="fas fa-edit"></i> Data Entry</a
            >
          </li>
          <li>
            <a href="productivity.html" class="nav-link"
              ><i class="fas fa-chart-bar"></i> Productivity Analysis</a
            >
          </li>
          <li>
            <a href="burnout.html" class="nav-link"
              ><i class="fas fa-fire"></i> Burnout Analysis</a
            >
          </li>
        </ul>
        <div class="user">
          <div class="user-card">
            <div class="user-content">
              <div class="user-img" aria-hidden="true">
                <i class="fa-solid fa-user"></i>
              </div>

              <div class="user-data">
                <h3 class="user-name">Loading...</h3>
              </div>

              <div class="user-button" id="user-btn">
                <i class="fa-solid fa-bars user-menu"></i>
                <i class="fa-solid fa-xmark user-close"></i>
              </div>
            </div>
            <div class="user-social" id="user-social">
              <a href="notes.html" class="user-link">
                <span>
                  <i class="fa-solid fa-pencil"></i>
                </span>
              </a>

              <a href="feedback.html" class="user-link">
                <span>
                  <i class="fa-regular fa-comment"></i>
                </span>
              </a>

              <a href="logout.html" class="user-link active">
                <span>
                  <i class="fa-solid fa-right-to-bracket"></i>
                </span>
              </a>
            </div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="main">
        <!-- NAVBAR -->
        <header class="navbar">
          <h2>
            <i class="fa-solid fa-graduation-cap"></i> Student Productivity
            Tracker
          </h2>
          <div class="nav-right">
            <label class="theme-toggle">
              <input type="checkbox" id="toggleMode" />
              <span class="slider">
                <span class="icon moon-icon">🌙</span>
                <span class="icon sun-icon">☀️</span>
              </span>
            </label>
          </div>
        </header>

        <div class="contact-container">
          <h2>Let's Connect</h2>
          <p class="sub-heading">
            Have any questions or feedback? We'd love to hear from you!
          </p>

          <form action="">
            <div class="top-section">
              <div class="input-group">
                <label for="fullname">Your Name</label>
                <div class="input-container">
                  <i class="fa-solid fa-user"></i>
                  <input type="text" id="fullname" placeholder="Enter your name" required />
                </div>
              </div>

              <div class="input-group">
                <label for="date">Date</label>
                <div class="input-container">
                  <i class="fa-solid fa-calendar"></i>
                  <input type="date" id="date" required />
                </div>
              </div>
            </div>

            <div class="input-group">
              <label for="message">Message</label>
              <textarea id="message" placeholder="Enter your message" required></textarea>
            </div>

            <div class="btn-input">
              <i class="fa-regular fa-paper-plane"></i>
              <input type="submit" value="Send" />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../../scripts/global.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCI1lghCfgBf5S-PEfZ_6DEHaSYu76aUT4",
        authDomain: "priahitam71-000000.firebaseapp.com",
        projectId: "priahitam71-000000",
        storageBucket: "priahitam71-000000.firebasestorage.app",
        messagingSenderId: "543874144759",
        appId: "1:543874144759:web:d55e0dd1bc7f2d201276f2",
        measurementId: "G-JS7VFF76YX"
      };

      const app = initializeApp(firebaseConfig);
      window.auth = getAuth(app);
      window.db = getFirestore(app);
    </script>
    <script src="../scripts/feedback.js"></script>
  </body>
</html>
