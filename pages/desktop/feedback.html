<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/desktop/desktop-layout.css" />
    <link rel="stylesheet" href="../../styles/desktop/desktop-style.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/component.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="style-node layout-node layout">
      <!-- SIDEBAR -->
      <aside class="style-node layout-node desk-sidebar">
        <div class="style-node layout-node desk-sidebar-header">
          <h2>
            <i class="style-node layout-node fa-solid fa-inbox"></i> Voice Board
          </h2>
        </div>
        <ul>
          <li>
            <a
              href="home.html"
              class="style-node layout-node nav-link desk-nav-link-home"
              ><img src="../../assets/logo.png" alt="Home" />
              <span>Home</span></a
            >
          </li>
          <li
            class="style-node layout-node sidebar-divider"
            aria-hidden="true"
          ></li>
          <li>
            <a href="dashboard.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-chart-line"></i>
              Dashboard</a
            >
          </li>
          <li>
            <a href="data.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-edit"></i> Data Entry</a
            >
          </li>
          <li>
            <a href="productivity.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-chart-bar"></i>
              Productivity Analysis</a
            >
          </li>
          <li>
            <a href="burnout.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-fire"></i> Burnout
              Analysis</a
            >
          </li>
        </ul>
        <div class="style-node layout-node user">
          <div class="style-node layout-node user-card">
            <div class="style-node layout-node user-content">
              <div class="style-node layout-node user-img" aria-hidden="true">
                <i class="style-node layout-node fa-solid fa-user"></i>
              </div>

              <div class="style-node layout-node user-data">
                <h3 class="style-node layout-node user-name">Loading...</h3>
              </div>

              <div class="style-node layout-node user-button" id="user-btn">
                <i
                  class="style-node layout-node fa-solid fa-bars user-menu"
                ></i>
                <i
                  class="style-node layout-node fa-solid fa-xmark user-close"
                ></i>
              </div>
            </div>
            <div class="style-node layout-node user-social" id="user-social">
              <a href="notes.html" class="style-node layout-node user-link">
                <span>
                  <i class="style-node layout-node fa-regular fa-folder-open"></i>
                </span>
              </a>

              <a href="feedback.html" class="style-node layout-node user-link">
                <span>
                  <i class="style-node layout-node fa-regular fa-inbox"></i>
                </span>
              </a>

              <a
                href="logout.html"
                class="style-node layout-node user-link active"
              >
                <span>
                  <i
                    class="style-node layout-node fa-solid fa-sign-out-alt"
                  ></i>
                </span>
              </a>
            </div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="style-node layout-node main">
        <!-- NAVBAR -->
        <header class="style-node layout-node desk-navbar">
          <h2>
            <i class="style-node layout-node fa-solid fa-graduation-cap"></i>
            Student Productivity Tracker
          </h2>
          <div class="style-node layout-node desk-nav-right">
            <label class="style-node layout-node theme-toggle">
              <input type="checkbox" id="toggleMode" />
              <span class="style-node layout-node slider">
                <span class="style-node layout-node icon moon-icon">🌙</span>
                <span class="style-node layout-node icon sun-icon">☀️</span>
              </span>
            </label>
          </div>
        </header>

        <div class="style-node layout-node contact-container">
          <h2>Let's Connect</h2>
          <p class="style-node layout-node sub-heading">
            Have any questions or feedback? We'd love to hear from you!
          </p>

          <form action="">
            <div class="style-node layout-node top-section">
              <div class="style-node layout-node input-group">
                <label for="fullname">Your Name</label>
                <div class="style-node layout-node input-container">
                  <i class="style-node layout-node fa-solid fa-user"></i>
                  <input
                    type="text"
                    id="fullname"
                    placeholder="Enter your name"
                    required
                  />
                </div>
              </div>

              <div class="style-node layout-node input-group">
                <label for="date">Date</label>
                <div class="style-node layout-node input-container">
                  <i class="style-node layout-node fa-solid fa-calendar"></i>
                  <input type="date" id="date" required />
                </div>
              </div>
            </div>

            <div class="style-node layout-node input-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                placeholder="Enter your message"
                required
              ></textarea>
            </div>

            <div class="style-node layout-node btn-input">
              <i class="style-node layout-node fa-regular fa-paper-plane"></i>
              <input type="submit" value="Send" />
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../../scripts/global.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCI1lghCfgBf5S-PEfZ_6DEHaSYu76aUT4",
        authDomain: "priahitam71-000000.firebaseapp.com",
        projectId: "priahitam71-000000",
        storageBucket: "priahitam71-000000.firebasestorage.app",
        messagingSenderId: "543874144759",
        appId: "1:543874144759:web:d55e0dd1bc7f2d201276f2",
        measurementId: "G-JS7VFF76YX",
      };

      const app = initializeApp(firebaseConfig);
      window.auth = getAuth(app);
      window.db = getFirestore(app);
    </script>
    <script src="../scripts/feedback.js"></script>
  </body>
</html>
