<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <script src="../../scripts/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <link rel="stylesheet" href="../../styles/desktop/desktop-layout.css" />
    <link rel="stylesheet" href="../../styles/desktop/desktop-style.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/component.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="style-node layout-node layout">
      <!-- SIDEBAR -->
      <aside class="style-node layout-node desk-sidebar">
        <div class="style-node layout-node desk-sidebar-header">
          <h2><i class="style-node layout-node fas fa-fire"></i> Burnout Analysis</h2>
        </div>
        <ul>
          <li>
            <a href="home.html" class="style-node layout-node nav-link desk-nav-link-home">
              <img src="../../assets/logo.png" alt="Home" /> <span>Home</span></a>
          </li>
          <li class="style-node layout-node sidebar-divider" aria-hidden="true"></li>
          <li>
            <a href="dashboard.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-chart-line"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="data.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-edit"></i> Data Entry</a
            >
          </li>
          <li>
            <a href="productivity.html" class="style-node layout-node nav-link"
              ><i class="style-node layout-node fas fa-chart-bar"></i> Productivity Analysis</a
            >
          </li>
          <li>
            <a href="burnout.html" class="style-node layout-node nav-link active"
              ><i class="style-node layout-node fas fa-fire"></i> Burnout Analysis</a
            >
          </li>
        </ul>
        <div class="style-node layout-node user">
          <div class="style-node layout-node user-card">
            <div class="style-node layout-node user-content">
              <div class="style-node layout-node user-img" aria-hidden="true">
                <i class="style-node layout-node fa-solid fa-user"></i>
              </div>

              <div class="style-node layout-node user-data">
                <h3 class="style-node layout-node user-name">Loading...</h3>
              </div>

              <div class="style-node layout-node user-button" id="user-btn">
                <i class="style-node layout-node fa-solid fa-bars user-menu"></i>
                <i class="style-node layout-node fa-solid fa-xmark user-close"></i>
              </div>
            </div>
            <div class="style-node layout-node user-social" id="user-social">
              <a href="notes.html" class="style-node layout-node user-link">
                <span>
                  <i class="style-node layout-node fa-regular fa-folder-open"></i>
                </span>
              </a>

              <a href="feedback.html" class="style-node layout-node user-link">
                <span>
                  <i class="style-node layout-node fa-solid fa-inbox"></i>
                </span>
              </a>

              <a href="logout.html" class="style-node layout-node user-link active">
                <span>
                  <i class="style-node layout-node fa-solid fa-sign-out-alt"></i>
                </span>
              </a>
            </div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="style-node layout-node main">
        <!-- NAVBAR -->
        <header class="style-node layout-node desk-navbar">
          <h2>
            <i class="style-node layout-node fa-solid fa-graduation-cap"></i> Student Productivity
            Tracker
          </h2>
          <div class="style-node layout-node desk-nav-right">
            <label class="style-node layout-node theme-toggle">
              <input type="checkbox" id="toggleMode" />
              <span class="style-node layout-node slider">
                <span class="style-node layout-node icon moon-icon">🌙</span>
                <span class="style-node layout-node icon sun-icon">☀️</span>
              </span>
            </label>
          </div>
        </header>

        <div class="style-node layout-node analysis-container">
          <!-- Grafik Lingkaran -->
          <div class="style-node layout-node chart-box circular-container">
            <h3>Burnout Score</h3>
            <div class="style-node layout-node circle">
              <svg viewBox="0 0 36 36" class="style-node layout-node circular-chart blue">
                <path
                  class="style-node layout-node circle-bg"
                  d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path
                  class="style-node layout-node circle-path"
                  stroke-dasharray="90, 100"
                  d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="20.35" class="style-node layout-node percentage">90%</text>
              </svg>
            </div>
            <p id="statusText" style="text-align: center; margin-top: 10px">
              Category: -
            </p>
          </div>

          <!-- Grafik Jam Tidur -->
          <div class="style-node layout-node chart-box chart-panel" id="burnoutChartPanel">
            <h3>Weekly Burnout Chart</h3>
            <canvas id="sleepChart"></canvas>
          </div>

          <!-- Insight -->
          <div class="style-node layout-node analysis-box">
            <h3>Insight Box</h3>
            <div class="style-node layout-node analysis-card insight-panel is-empty" id="insightBox">
              âš  Belum ada data untuk ditampilkan
            </div>
          </div>
          <div class="style-node layout-node analysis-box">
            <h3>Personal Notes</h3>
            <div class="style-node layout-node analysis-card personal-panel is-empty" id="tipsBox">
              âš  Belum ada data untuk ditampilkan
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPT DI BAWAH SEMUA -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../scripts/burnout.js"></script>
    <script src="../../scripts/global.js"></script>

        storageBucket: "priahitam71-000000.firebasestorage.app",
        messagingSenderId: "543874144759",
        appId: "1:543874144759:web:d55e0dd1bc7f2d201276f2",
        measurementId: "G-JS7VFF76YX"

      const app = initializeApp(firebaseConfig);
      window.auth = getAuth(app);

  </body>
</html>
