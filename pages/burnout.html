<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="../styles/burnout.css" />
    <link rel="stylesheet" href="../styles/global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2><i class="fas fa-fire"></i> Burnout Analysis</h2>
        </div>
        <ul>
          <li>
            <a href="home.html" class="nav-link nav-link-home">
              <img src="../assets/logo.png" alt="Home" /> <span>Home</span></a>
          </li>
          <li class="sidebar-divider" aria-hidden="true"></li>
          <li>
            <a href="dashboard.html" class="nav-link"
              ><i class="fas fa-chart-line"></i> Dashboard</a
            >
          </li>
          <li>
            <a href="data.html" class="nav-link"
              ><i class="fas fa-edit"></i> Data Entry</a
            >
          </li>
          <li>
            <a href="productivity.html" class="nav-link"
              ><i class="fas fa-chart-bar"></i> Productivity Analysis</a
            >
          </li>
          <li>
            <a href="burnout.html" class="nav-link active"
              ><i class="fas fa-fire"></i> Burnout Analysis</a
            >
          </li>
        </ul>
        <div class="user">
          <div class="user-card">
            <div class="user-content">
              <div class="user-img" aria-hidden="true">
                <i class="fa-solid fa-user"></i>
              </div>

              <div class="user-data">
                <h3 class="user-name">Shahzada</h3>
              </div>

              <div class="user-button" id="user-btn">
                <i class="fa-solid fa-bars user-menu"></i>
                <i class="fa-solid fa-xmark user-close"></i>
              </div>
            </div>
            <div class="user-social" id="user-social">
              <a href="#" target="_blank" class="user-link">
                <span>
                  <i class="fa-solid fa-pencil"></i>
                </span>
              </a>

              <a href="#" target="_blank" class="user-link">
                <span>
                  <i class="fa-regular fa-comment"></i>
                </span>
              </a>

              <a href="#" target="_blank" class="user-link">
                <span>
                  <i class="fa-solid fa-right-to-bracket"></i>
                </span>
              </a>
            </div>
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <div class="main">
        <!-- NAVBAR -->
        <header class="navbar">
          <h2>
            <i class="fa-solid fa-graduation-cap"></i> Student Productivity
            Tracker
          </h2>
          <div class="nav-right">
            <label class="theme-toggle">
              <input type="checkbox" id="toggleMode" />
              <span class="slider">
                <span class="icon moon-icon">🌙</span>
                <span class="icon sun-icon">☀️</span>
              </span>
            </label>
          </div>
        </header>

        <div class="analysis-container">
          <!-- Grafik Lingkaran -->
          <div class="chart-box circular-container">
            <h3>Burnout Score</h3>
            <div class="circle">
              <svg viewBox="0 0 36 36" class="circular-chart blue">
                <path
                  class="circle-bg"
                  d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <path
                  class="circle-path"
                  stroke-dasharray="90, 100"
                  d="M18 2.0845
                  a 15.9155 15.9155 0 0 1 0 31.831
                  a 15.9155 15.9155 0 0 1 0 -31.831"
                />
                <text x="18" y="20.35" class="percentage">90%</text>
              </svg>
            </div>
            <p id="statusText" style="text-align: center; margin-top: 10px">
              Category: -
            </p>
          </div>

          <!-- Grafik Jam Tidur -->
          <div class="chart-box chart-panel" id="burnoutChartPanel">
            <h3>Weekly Burnout Chart</h3>
            <canvas id="sleepChart"></canvas>
          </div>

          <!-- Insight -->
          <div class="analysis-box">
            <h3>Insight Box</h3>
            <div class="analysis-card insight-panel is-empty" id="insightBox">
              ⚠ Belum ada data untuk ditampilkan
            </div>
          </div>
          <div class="analysis-box">
            <h3>Personal Notes</h3>
            <div class="analysis-card personal-panel is-empty" id="tipsBox">
              ⚠ Belum ada data untuk ditampilkan
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPT DI BAWAH SEMUA -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../scripts/burnout.js"></script>
    <script src="../scripts/global.js"></script>
  </body>
</html>
