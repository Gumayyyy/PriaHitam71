<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Productivity Tracker</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../styles/logout.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="logout-theme-toggle">
      <label class="theme-toggle" aria-label="Toggle dark mode">
        <input type="checkbox" id="toggleMode" />
        <span class="slider">
          <span class="icon moon-icon">🌙</span>
          <span class="icon sun-icon">☀️</span>
        </span>
      </label>
    </div>

    <div class="logout-modal active" id="logoutModal">
      <div class="modal-box">
        <!-- Icon -->
        <div class="modal-icon">
          <i class="fas fa-exclamation-triangle"></i>
        </div>

        <!-- Title -->
        <h2>Log out of your account?</h2>

        <!-- Description -->
        <p>
          You’re about to end your current session. Make sure all your progress
          is saved.
        </p>

        <!-- Small info -->
        <div class="modal-info">
          <span><i class="fas fa-user"></i> Active user</span>
          <span class="dot"></span>
          <span>Status: Online</span>
        </div>

        <!-- Actions -->
        <div class="modal-actions">
          <!-- Cancel = kembali ke halaman sebelumnya -->
          <button class="btn cancel" id="cancelLogoutBtn" type="button">
            Cancel
          </button>

          <!-- Logout = sign out and pindah ke login -->
          <button class="btn confirm" id="confirmLogoutBtn" type="button">
            Yes, Log out
          </button>
        </div>
      </div>
    </div>

    <script src="../scripts/logout.js"></script>
    <script src="../scripts/global.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCI1lghCfgBf5S-PEfZ_6DEHaSYu76aUT4",
        authDomain: "priahitam71-000000.firebaseapp.com",
        projectId: "priahitam71-000000",
        storageBucket: "priahitam71-000000.firebasestorage.app",
        messagingSenderId: "543874144759",
        appId: "1:543874144759:web:d55e0dd1bc7f2d201276f2",
        measurementId: "G-JS7VFF76YX"
      };

      const app = initializeApp(firebaseConfig);
      window.auth = getAuth(app);
    </script>
  </body>
</html>
