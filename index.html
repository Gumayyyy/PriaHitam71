<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../../assets/logo.png" />
    <title>Student Productivity Tracker</title>
  </head>
  <body>
    <script>
      const isPhone = window.matchMedia("(max-width: 767px)").matches;
      const viewportWidth = window.visualViewport?.width || window.innerWidth;
      const viewportHeight =
        window.visualViewport?.height || window.innerHeight;
      const shortEdge = Math.min(viewportWidth, viewportHeight);
      const longEdge = Math.max(viewportWidth, viewportHeight);
      const isTabletLike = shortEdge >= 600 && longEdge <= 1600;
      const isPortrait = viewportHeight >= viewportWidth;

      if (isPhone || (isTabletLike && isPortrait)) {
        window.location.href = "pages/mobile/login.html";
      } else {
        window.location.href = "pages/desktop/login.html";
      }
    </script>
  </body>
</html>
